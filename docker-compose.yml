services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: garden
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: garden
    ports:
      - "5432:5432"
    volumes:
      - garden_db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d garden"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@garden.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - garden_pgadmin:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass
    entrypoint: ["/bin/sh", "-c", "cp /pgpass /tmp/.pgpass && chmod 600 /tmp/.pgpass && /entrypoint.sh"]

volumes:
  garden_db:
  garden_pgadmin:
