services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: garden
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: garden
    ports:
      - "5432:5432"
    volumes:
      - garden_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d garden"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  garden_db:
